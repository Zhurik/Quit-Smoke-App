allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

subprojects {
    afterEvaluate { project ->
        if (project.hasProperty("android")) {
            def android = project.extensions.findByName("android")
            if (android != null && android.hasProperty("namespace") && (android.namespace == null || android.namespace.toString().trim().isEmpty())) {
                def manifestFile = android.sourceSets?.main?.manifest?.srcFile
                if (manifestFile != null && manifestFile.exists()) {
                    def manifestText = manifestFile.getText('UTF-8')
                    def matcher = manifestText =~ /package\s*=\s*"([^"]+)"/
                    if (matcher.find()) {
                        android.namespace = matcher.group(1)
                    }
                }
            }
        }
    }
}

rootProject.buildDir = '../build'
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(':app')
}

tasks.register("clean", Delete) {
    delete rootProject.layout.buildDirectory
}
